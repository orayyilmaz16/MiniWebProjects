<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hırt Avcısı: Sokakların Kontrolü</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        
        <div class="scanlines"></div>
        <div id="flash-screen"></div>

        <div id="hud" class="hidden">
            <div class="hud-left">
                <div class="hud-box stat-score">SKOR: <span id="score-text">0</span></div>
                <div class="hud-box stat-highscore" style="font-size:14px; border-left: 2px solid #f1c40f; color:#aaa;">REKOR: <span id="highscore-text">0</span></div>
                <div class="energy-container">
                    <div class="energy-text">
                        <span>ULTİ (E)</span>
                        <span id="energy-percent">0%</span>
                    </div>
                    <div class="energy-bar-bg">
                        <div id="energy-fill" class="energy-fill"></div>
                    </div>
                </div>
            </div>
            
            <div class="hud-center">
                <div class="hud-box stat-level">BÖLÜM <span id="level-text">1</span></div>
                <button class="btn-pause" onclick="togglePause()">|| DURAKLAT</button>
            </div>

            <div class="hud-right">
                <div class="hud-box stat-lives">CAN: <span id="lives-text">3</span></div>
            </div>
        </div>

        <div id="godmode-warning" class="hidden" style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); color: #e74c3c; font-size: 18px; font-weight: bold; text-shadow: 0 0 10px #e74c3c; z-index: 15; letter-spacing: 2px; text-transform: uppercase;">
            ⚠️ Ölümsüzlük Aktif - Rekor Kaydedilmez ⚠️
        </div>

        <canvas id="gameCanvas" width="800" height="600"></canvas>

        <div id="menu-main" class="menu-overlay">
            <div class="menu-content">
                <img src="hırtescape.jpg" alt="Hırt Avcısı Başlangıç" class="menu-image">
                <h1 class="game-title">HIRT AVCISI</h1>
                <p class="subtitle">SOKAKLARIN KONTROLÜ</p>
                <button class="menu-btn" onclick="initAudioAndStart()">Oyuna Başla</button>
                <button class="menu-btn" onclick="showMenu('menu-settings')">Ayarlar</button>
            </div>
        </div>

        <div id="menu-settings" class="menu-overlay hidden">
            <div class="menu-content" style="max-height: 90vh; overflow-y: auto;">
                <h2 class="menu-title">SİSTEM AYARLARI</h2>
                
                <div class="setting-group">
                    <label>Başlangıç Zorluğu</label>
                    <select id="difficulty-select" class="setting-select" onchange="updateSettings()">
                        <option value="easy">Çaylak (Yavaş)</option>
                        <option value="normal" selected>Asayiş (Normal)</option>
                        <option value="hard">Özel Harekat (Zor)</option>
                    </select>
                </div>

                <div class="setting-group">
                    <label>Arka Plan Müziği</label>
                    <select id="music-select" class="setting-select" onchange="updateSettings()">
                        <option value="on" selected>Açık</option>
                        <option value="off">Kapalı</option>
                    </select>
                </div>

                <div class="setting-group">
                    <label>Siber Yağmur</label>
                    <select id="rain-select" class="setting-select" onchange="updateSettings()">
                        <option value="heavy" selected>Yoğun (Siberpunk)</option>
                        <option value="light">Hafif</option>
                        <option value="off">Kapalı</option>
                    </select>
                </div>

                <div class="setting-group">
                    <label>Görsel Kalite</label>
                    <select id="gfx-select" class="setting-select" onchange="updateSettings()">
                        <option value="high" selected>Yüksek (Tüm Efektler)</option>
                        <option value="low">Performans Modu (Düşük)</option>
                    </select>
                </div>

                <div class="setting-group" style="border: 1px solid #e74c3c; padding: 10px; border-radius: 5px; background: rgba(231, 76, 60, 0.1);">
                    <label style="color: #e74c3c;">Sınırsız Can (Ölümsüzlük)</label>
                    <select id="godmode-select" class="setting-select" onchange="updateSettings()" style="border-color: #e74c3c;">
                        <option value="off" selected>Kapalı (Normal Oyun)</option>
                        <option value="on">Açık (Sonsuz Oyun)</option>
                    </select>
                    <small style="color:#aaa; font-size:12px; display:block; margin-top:5px;">Açıldığında rekorunuz <b>kesinlikle kaydedilmez.</b></small>
                </div>

                <button class="menu-btn btn-red" style="margin-top: 20px;" onclick="showMenu('menu-main')">Geri Dön</button>
            </div>
        </div>

        <div id="menu-pause" class="menu-overlay hidden">
            <div class="menu-content">
                <h2 class="menu-title">SİSTEM DURAKLATILDI</h2>
                <button class="menu-btn" onclick="togglePause()">Geri Dön</button>
                <button class="menu-btn btn-red" onclick="switchState('MENU')">Ana Menüye Çık</button>
            </div>
        </div>

        <div id="menu-gameover" class="menu-overlay hidden">
            <div class="menu-content">
                <img src="hırtmenu.jpg" alt="Oyun Kaybedildi" class="menu-image">
                <h1 class="game-title" style="color: var(--primary); text-shadow: 0 0 20px red;">GÖREV BAŞARISIZ</h1>
                <div class="final-stats">
                    <p>Ulaşılan Bölüm: <span id="final-level" style="color: #00f0ff;">1</span></p>
                    <p>Final Skorun: <span id="final-score" style="color: #f1c40f;">0</span></p>
                    <p style="margin-top: 10px; font-size: 16px; color: #2ecc71;" id="highscore-alert"></p>
                </div>
                <button class="menu-btn" onclick="initAudioAndStart()">Tekrar Sahaya Dön</button>
                <button class="menu-btn btn-red" onclick="switchState('MENU')">Ana Menü</button>
            </div>
        </div>

        <div id="level-up-screen" class="hidden">
            <h1 id="level-up-text">BÖLÜM 2</h1>
        </div>

    </div>

    <script src="game.js"></script>
</body>
</html>
