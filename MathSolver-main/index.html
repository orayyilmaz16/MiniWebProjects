<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fonksiyon Çözücü</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <main class="container">
    <!-- Üst Kısım -->
    <header class="hero">
      <h1>Fonksiyon Çözücü</h1>
      <p>Matematiksel ifadeni gir ve analiz et 🎯</p>
      <div class="input-row">
        <input id="expr" type="text" placeholder="f(x) = ..." value="sin(x) + x^2 - 3">
        <input id="rangeMin" type="number" step="0.1" value="-5" title="Min">
        <input id="rangeMax" type="number" step="0.1" value="5" title="Max">
        <button id="solveBtn">Çöz</button>
      </div>
      <small class="hint">Desteklenen fonksiyonlar: sin, cos, tan, log, ln, exp, sqrt, abs, pow, PI, E</small>
    </header>

    <!-- Sonuç Kartı -->
    <section class="grid">
      <article class="card" id="results">
        <h2>Sonuçlar</h2>
        <div class="content"></div>
      </article>
    </section>
  </main>

  <footer class="footer">
    <p>⚡ Oray’ın Fonksiyon Çözücüsü</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
