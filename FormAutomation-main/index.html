<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Otomasyon Sistemi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }
        .page {
            position: absolute;
            width: 100%;
            left: 0;
            top: 0;
            padding: 20px;
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform, opacity;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        .page.hidden {
            transform: translateX(-100%);
            opacity: 0;
            pointer-events: none;
        }
        .page.slide-left {
            transform: translateX(-100%);
            opacity: 0;
            pointer-events: none;
        }
        .page.slide-right {
            transform: translateX(100%);
            opacity: 0;
            pointer-events: none;
        }
        #successPage {
            transform: translateX(100%);
            opacity: 0;
            pointer-events: none;
        }
        #successPage.active {
            transform: translateX(0);
            opacity: 1;
            pointer-events: auto;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #667eea;
            margin-bottom: 10px;
            text-align: center;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        .control-panel {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-fill {
            background: #667eea;
            color: white;
        }
        .btn-fill:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .btn-clear {
            background: #dc3545;
            color: white;
        }
        .btn-clear:hover {
            background: #c82333;
            transform: translateY(-2px);
        }
        .btn-validate {
            background: #28a745;
            color: white;
        }
        .btn-validate:hover {
            background: #218838;
            transform: translateY(-2px);
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        .status {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            animation: slideIn 0.3s;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 2px solid #bee5eb;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
            display: none;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
        }
        .checkbox-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .checkbox-item input[type="checkbox"] {
            width: auto;
        }
    </style>
</head>
<body>
    <!-- Form Sayfası -->
    <div class="page" id="formPage">
        <div class="container">
        <h1>🤖 Form Otomasyon Sistemi</h1>
        <p class="subtitle">Formları otomatik olarak doldurun ve doğrulayın</p>
        
        <div class="control-panel">
            <button class="btn-fill" onclick="autoFillForm()">📝 Otomatik Doldur</button>
            <button class="btn-clear" onclick="clearForm()">🗑️ Temizle</button>
            <button class="btn-validate" onclick="validateForm()">✅ Doğrula</button>
        </div>

        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="status" id="status"></div>

        <form id="mainForm">
            <div class="form-group">
                <label for="fullName">Ad Soyad *</label>
                <input type="text" id="fullName" name="fullName" required>
            </div>

            <div class="form-group">
                <label for="email">E-posta *</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="phone">Telefon *</label>
                <input type="tel" id="phone" name="phone" required>
            </div>

            <div class="form-group">
                <label for="birthDate">Doğum Tarihi</label>
                <input type="date" id="birthDate" name="birthDate">
            </div>

            <div class="form-group">
                <label for="country">Ülke *</label>
                <select id="country" name="country" required>
                    <option value="">Seçiniz...</option>
                    <option value="TR">Türkiye</option>
                    <option value="US">Amerika</option>
                    <option value="UK">İngiltere</option>
                    <option value="DE">Almanya</option>
                    <option value="FR">Fransa</option>
                </select>
            </div>

            <div class="form-group">
                <label for="city">Şehir</label>
                <input type="text" id="city" name="city">
            </div>

            <div class="form-group">
                <label>İlgi Alanları</label>
                <div class="checkbox-group">
                    <div class="checkbox-item">
                        <input type="checkbox" id="tech" name="interests" value="teknoloji">
                        <label for="tech">Teknoloji</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="sports" name="interests" value="spor">
                        <label for="sports">Spor</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="music" name="interests" value="muzik">
                        <label for="music">Müzik</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="travel" name="interests" value="seyahat">
                        <label for="travel">Seyahat</label>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="comments">Yorumlar</label>
                <textarea id="comments" name="comments"></textarea>
            </div>

            <div class="form-group">
                <button type="submit" class="btn-fill" style="width: 100%; padding: 15px; font-size: 16px;">
                    📤 Formu Gönder
                </button>
            </div>
        </form>
        </div>
    </div>

    <!-- Başarı Sayfası -->
    <div class="page" id="successPage">
        <div class="container" style="text-align: center;">
            <div style="font-size: 80px; margin-bottom: 20px; animation: bounce 0.6s;">✅</div>
            <h1 style="color: #28a745; margin-bottom: 20px;">Form Başarıyla Gönderildi!</h1>
            <p style="color: #666; font-size: 18px; margin-bottom: 30px;">Bilgileriniz başarıyla kaydedildi.</p>
            
            <div style="background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 30px; text-align: left;">
                <h2 style="color: #667eea; margin-bottom: 20px; text-align: center; font-size: 20px;">📋 Gönderilen Bilgiler</h2>
                <div id="submittedData" style="font-size: 15px; color: #333; line-height: 2;"></div>
            </div>

            <div style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
                <button onclick="goBackToForm()" class="btn-fill" style="padding: 15px 30px; font-size: 16px;">
                    ⬅️ Forma Geri Dön
                </button>
                <button onclick="resetAndStart()" class="btn-clear" style="padding: 15px 30px; font-size: 16px;">
                    🔄 Yeni Form Oluştur
                </button>
            </div>
        </div>
    </div>

    <style>
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>

    <script>
        // Rastgele veri üretici fonksiyonlar
        const randomData = {
            names: ['Ahmet Yılmaz', 'Mehmet Demir', 'Ayşe Kaya', 'Fatma Şahin', 'Ali Çelik', 
                    'Zeynep Aydın', 'Mustafa Öztürk', 'Elif Yıldız', 'Emre Arslan', 'Seda Koç'],
            cities: ['İstanbul', 'Ankara', 'İzmir', 'Bursa', 'Antalya', 'Adana', 'Gaziantep', 'Konya'],
            domains: ['gmail.com', 'hotmail.com', 'yahoo.com', 'outlook.com', 'yandex.com'],
            comments: [
                'Bu form otomatik olarak dolduruldu.',
                'Test amaçlı oluşturulmuş içeriktir.',
                'Otomasyon sistemi başarıyla çalışıyor.',
                'Harika bir deneyim!',
                'Çok kullanışlı bir sistem.'
            ]
        };

        function getRandomElement(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function generateEmail(name) {
            const cleanName = name.toLowerCase()
                .replace(/ğ/g, 'g').replace(/ü/g, 'u').replace(/ş/g, 's')
                .replace(/ı/g, 'i').replace(/ö/g, 'o').replace(/ç/g, 'c')
                .replace(/\s+/g, '.');
            const domain = getRandomElement(randomData.domains);
            return `${cleanName}@${domain}`;
        }

        function generatePhone() {
            return `05${Math.floor(Math.random() * 90 + 10)}${Math.floor(Math.random() * 10000000).toString().padStart(7, '0')}`;
        }

        function generateDate() {
            const year = 1970 + Math.floor(Math.random() * 35);
            const month = (Math.floor(Math.random() * 12) + 1).toString().padStart(2, '0');
            const day = (Math.floor(Math.random() * 28) + 1).toString().padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        // Otomatik form doldurma
        async function autoFillForm() {
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            const status = document.getElementById('status');
            
            progressBar.style.display = 'block';
            status.style.display = 'none';
            
            const name = getRandomElement(randomData.names);
            const fields = [
                { id: 'fullName', value: name, delay: 200 },
                { id: 'email', value: generateEmail(name), delay: 300 },
                { id: 'phone', value: generatePhone(), delay: 300 },
                { id: 'birthDate', value: generateDate(), delay: 200 },
                { id: 'country', value: 'TR', delay: 200 },
                { id: 'city', value: getRandomElement(randomData.cities), delay: 300 },
                { id: 'comments', value: getRandomElement(randomData.comments), delay: 400 }
            ];

            for (let i = 0; i < fields.length; i++) {
                const field = fields[i];
                const element = document.getElementById(field.id);
                
                // Typing animasyonu
                if (field.id === 'fullName' || field.id === 'email' || field.id === 'city') {
                    await typeText(element, field.value, 50);
                } else {
                    element.value = field.value;
                }
                
                progressFill.style.width = ((i + 1) / fields.length * 100) + '%';
                await sleep(field.delay);
            }

            // Rastgele checkbox seçimi
            const checkboxes = document.querySelectorAll('input[name="interests"]');
            const numToCheck = Math.floor(Math.random() * 3) + 1;
            const indices = [];
            while (indices.length < numToCheck) {
                const idx = Math.floor(Math.random() * checkboxes.length);
                if (!indices.includes(idx)) {
                    indices.push(idx);
                    checkboxes[idx].checked = true;
                }
            }

            await sleep(300);
            progressBar.style.display = 'none';
            showStatus('Form başarıyla dolduruldu! ✨', 'success');
        }

        // Yazma animasyonu
        async function typeText(element, text, speed) {
            element.value = '';
            for (let char of text) {
                element.value += char;
                await sleep(speed);
            }
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // Form temizleme
        function clearForm() {
            document.getElementById('mainForm').reset();
            showStatus('Form temizlendi! 🗑️', 'info');
        }

        // Form doğrulama
        function validateForm() {
            const form = document.getElementById('mainForm');
            const requiredFields = form.querySelectorAll('[required]');
            const errors = [];

            requiredFields.forEach(field => {
                if (!field.value.trim()) {
                    errors.push(field.previousElementSibling.textContent);
                }
            });

            const email = document.getElementById('email').value;
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (email && !emailRegex.test(email)) {
                errors.push('Geçersiz e-posta formatı');
            }

            const phone = document.getElementById('phone').value;
            const phoneRegex = /^05\d{9}$/;
            if (phone && !phoneRegex.test(phone)) {
                errors.push('Geçersiz telefon formatı (05XXXXXXXXX)');
            }

            if (errors.length > 0) {
                showStatus('❌ Hatalar:\n' + errors.join('\n'), 'error');
            } else {
                showStatus('✅ Tüm alanlar geçerli! Form gönderilebilir.', 'success');
            }
        }

        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = 'status ' + type;
            status.style.display = 'block';
            
            setTimeout(() => {
                status.style.display = 'none';
            }, 5000);
        }

        // Form submit işlemi
        document.getElementById('mainForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const data = {};
            
            for (let [key, value] of formData.entries()) {
                if (key === 'interests') {
                    if (!data.interests) data.interests = [];
                    data.interests.push(value);
                } else {
                    data[key] = value;
                }
            }

            // Checkbox'ları kontrol et
            if (!data.interests) {
                data.interests = [];
            }

            // Başarı sayfası içeriğini oluştur
            const submittedData = document.getElementById('submittedData');
            submittedData.innerHTML = '<table style="width: 100%; border-collapse: collapse;">' +
                '<tr style="border-bottom: 1px solid #e0e0e0;"><td style="padding: 12px 0; font-weight: 600; color: #667eea; width: 40%;">Ad Soyad:</td><td style="padding: 12px 0;">' + (data.fullName || '-') + '</td></tr>' +
                '<tr style="border-bottom: 1px solid #e0e0e0;"><td style="padding: 12px 0; font-weight: 600; color: #667eea;">E-posta:</td><td style="padding: 12px 0;">' + (data.email || '-') + '</td></tr>' +
                '<tr style="border-bottom: 1px solid #e0e0e0;"><td style="padding: 12px 0; font-weight: 600; color: #667eea;">Telefon:</td><td style="padding: 12px 0;">' + (data.phone || '-') + '</td></tr>' +
                '<tr style="border-bottom: 1px solid #e0e0e0;"><td style="padding: 12px 0; font-weight: 600; color: #667eea;">Doğum Tarihi:</td><td style="padding: 12px 0;">' + (data.birthDate || '-') + '</td></tr>' +
                '<tr style="border-bottom: 1px solid #e0e0e0;"><td style="padding: 12px 0; font-weight: 600; color: #667eea;">Ülke:</td><td style="padding: 12px 0;">' + (data.country || '-') + '</td></tr>' +
                '<tr style="border-bottom: 1px solid #e0e0e0;"><td style="padding: 12px 0; font-weight: 600; color: #667eea;">Şehir:</td><td style="padding: 12px 0;">' + (data.city || '-') + '</td></tr>' +
                '<tr style="border-bottom: 1px solid #e0e0e0;"><td style="padding: 12px 0; font-weight: 600; color: #667eea;">İlgi Alanları:</td><td style="padding: 12px 0;">' + (data.interests.length > 0 ? data.interests.join(', ') : 'Seçilmedi') + '</td></tr>' +
                '<tr><td style="padding: 12px 0; font-weight: 600; color: #667eea; vertical-align: top;">Yorumlar:</td><td style="padding: 12px 0;">' + (data.comments || '-') + '</td></tr>' +
                '</table>';
            
            // Sayfalar arası geçiş animasyonu - requestAnimationFrame kullanarak optimize edildi
            requestAnimationFrame(() => {
                document.getElementById('formPage').classList.add('slide-left');
                document.getElementById('successPage').classList.add('active');
                window.scrollTo({ top: 0, behavior: 'instant' });
            });
        });

        function goBackToForm() {
            requestAnimationFrame(() => {
                document.getElementById('successPage').classList.remove('active');
                document.getElementById('formPage').classList.remove('slide-left');
                window.scrollTo({ top: 0, behavior: 'instant' });
            });
        }

        function resetAndStart() {
            document.getElementById('mainForm').reset();
            requestAnimationFrame(() => {
                document.getElementById('successPage').classList.remove('active');
                document.getElementById('formPage').classList.remove('slide-left');
                window.scrollTo({ top: 0, behavior: 'instant' });
                showStatus('Form sıfırlandı! Yeni bir form oluşturabilirsiniz. 🔄', 'info');
            });
        }
    </script>
</body>
</html>
