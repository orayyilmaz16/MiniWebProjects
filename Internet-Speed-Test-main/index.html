<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İnternet Hız Testi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2em;
        }

        .speed-display {
            text-align: center;
            margin: 30px 0;
        }

        .speed-value {
            font-size: 4em;
            font-weight: bold;
            color: #667eea;
            margin: 10px 0;
        }

        .speed-unit {
            font-size: 1.5em;
            color: #666;
        }

        .speed-label {
            font-size: 1.2em;
            color: #999;
            margin-bottom: 10px;
        }

        .results {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 30px 0;
        }

        .result-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .result-label {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .result-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #333;
        }

        .btn {
            width: 100%;
            padding: 15px;
            font-size: 1.2em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn-start {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-start:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-start:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
        }

        .status {
            text-align: center;
            color: #666;
            margin: 15px 0;
            font-size: 1.1em;
        }

        .ping-display {
            text-align: center;
            margin: 20px 0;
        }

        .ping-value {
            font-size: 2em;
            font-weight: bold;
            color: #28a745;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .testing {
            animation: pulse 1.5s infinite;
        }

        .info {
            background: #e7f3ff;
            border: 1px solid #2196F3;
            border-radius: 8px;
            padding: 12px;
            margin-top: 20px;
            font-size: 0.85em;
            color: #0c5460;
            text-align: center;
        }

        .jitter-value {
            font-size: 2em;
            font-weight: bold;
            color: #ff9800;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🚀 Hız Testi</h1>

        <div class="speed-display">
            <div class="speed-label" id="testType">Test Başlatmak İçin Butona Tıklayın</div>
            <div class="speed-value" id="speedValue">0</div>
            <div class="speed-unit">Mbps</div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="status" id="status">Hazır</div>

        <div class="results">
            <div class="result-box">
                <div class="result-label">📥 İndirme</div>
                <div class="result-value" id="downloadSpeed">-</div>
            </div>
            <div class="result-box">
                <div class="result-label">📤 Yükleme</div>
                <div class="result-value" id="uploadSpeed">-</div>
            </div>
        </div>

        <div class="ping-display">
            <div class="result-label">⚡ Ping</div>
            <div class="ping-value" id="pingValue">- ms</div>
        </div>

        <div class="ping-display">
            <div class="result-label">📊 Jitter</div>
            <div class="jitter-value" id="jitterValue">- ms</div>
        </div>

        <button class="btn btn-start" id="startBtn" onclick="startTest()">Testi Başlat</button>

        <div class="info">
            💡 Bu test tarayıcınızın performansını ve bağlantı gecikmenizi ölçer. Gerçek ağ hızı için büyük dosya
            indirmeleri gerekir.
        </div>
    </div>

    <script>
        let testing = false;

        // Ping ölçümü - CDN kaynaklarını kullanarak
        async function measurePing() {
            const iterations = 5;
            const results = [];

            updateStatus('Ping ölçülüyor...');
            document.getElementById('testType').textContent = '⚡ PING';

            // Popüler CDN'ler
            const cdnUrls = [
                'https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js',
                'https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css',
                'https://unpkg.com/react@18/umd/react.production.min.js',
                'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css',
                'https://cdn.jsdelivr.net/npm/vue@3.2.37/dist/vue.global.js'
            ];

            for (let i = 0; i < iterations; i++) {
                const start = performance.now();

                await new Promise((resolve) => {
                    const img = new Image();
                    const timeout = setTimeout(() => {
                        results.push(100);
                        resolve();
                    }, 2000);

                    img.onload = img.onerror = () => {
                        clearTimeout(timeout);
                        const end = performance.now();
                        results.push(end - start);
                        resolve();
                    };

                    // CDN kaynaklarını kullan
                    img.src = cdnUrls[i] + '?' + Date.now();
                });

                const currentAvg = results.reduce((a, b) => a + b, 0) / results.length;
                document.getElementById('pingValue').textContent = Math.round(currentAvg) + ' ms';

                const progress = ((i + 1) / iterations) * 25;
                document.getElementById('progressFill').style.width = progress + '%';

                await new Promise(resolve => setTimeout(resolve, 200));
            }

            const avgPing = results.reduce((a, b) => a + b, 0) / iterations;
            return Math.round(avgPing);
        }

        // İndirme hızı simülasyonu - Canvas ve Blob kullanarak
        async function measureDownloadSpeed() {
            const testDuration = 5000; // 5 saniye
            let totalBytes = 0;
            const startTime = performance.now();

            updateStatus('İndirme hızı hesaplanıyor...');
            document.getElementById('testType').textContent = '📥 İNDİRME';
            document.getElementById('speedValue').textContent = '0';

            // Büyük veri blokları oluştur ve işle
            while (performance.now() - startTime < testDuration) {
                // Canvas ile büyük görsel veri oluştur
                const canvas = document.createElement('canvas');
                canvas.width = 1920;
                canvas.height = 1080;
                const ctx = canvas.getContext('2d');

                // Rastgele piksel verisi oluştur
                const imageData = ctx.createImageData(canvas.width, canvas.height);
                const data = imageData.data;
                for (let i = 0; i < data.length; i += 4) {
                    data[i] = Math.random() * 255;     // R
                    data[i + 1] = Math.random() * 255; // G
                    data[i + 2] = Math.random() * 255; // B
                    data[i + 3] = 255;                 // A
                }
                ctx.putImageData(imageData, 0, 0);

                // Canvas'ı blob'a çevir (simüle edilmiş indirme)
                await new Promise(resolve => {
                    canvas.toBlob(blob => {
                        if (blob) {
                            totalBytes += blob.size;

                            const elapsed = (performance.now() - startTime) / 1000;
                            const mbps = ((totalBytes * 8) / (elapsed * 1000000)).toFixed(2);
                            document.getElementById('speedValue').textContent = mbps;

                            const progress = 25 + Math.min((elapsed / (testDuration / 1000)) * 25, 25);
                            document.getElementById('progressFill').style.width = progress + '%';
                        }
                        resolve();
                    }, 'image/jpeg', 0.9);
                });

                await new Promise(resolve => setTimeout(resolve, 100));
            }

            const totalSeconds = (performance.now() - startTime) / 1000;
            const speedMbps = ((totalBytes * 8) / (totalSeconds * 1000000)).toFixed(2);
            return speedMbps;
        }

        // Yükleme hızı simülasyonu - Veri sıkıştırma
        async function measureUploadSpeed() {
            const testDuration = 5000;
            let totalBytes = 0;
            const startTime = performance.now();

            updateStatus('Yükleme hızı hesaplanıyor...');
            document.getElementById('testType').textContent = '📤 YÜKLEME';
            document.getElementById('speedValue').textContent = '0';

            while (performance.now() - startTime < testDuration) {
                // Büyük veri bloğu oluştur
                const chunkSize = 1000000; // 1MB
                const data = new Uint8Array(chunkSize);

                // Rastgele veri ile doldur
                for (let i = 0; i < chunkSize; i++) {
                    data[i] = Math.floor(Math.random() * 256);
                }

                // Blob oluştur (simüle edilmiş yükleme)
                const blob = new Blob([data], { type: 'application/octet-stream' });
                totalBytes += blob.size;

                // JSON string'e çevir (sıkıştırma simülasyonu)
                const jsonData = {
                    timestamp: Date.now(),
                    size: blob.size,
                    checksum: data.reduce((sum, byte, i) => sum + (i % 100 === 0 ? byte : 0), 0)
                };
                const jsonStr = JSON.stringify(jsonData);

                const elapsed = (performance.now() - startTime) / 1000;
                const mbps = ((totalBytes * 8) / (elapsed * 1000000)).toFixed(2);
                document.getElementById('speedValue').textContent = mbps;

                const progress = 50 + Math.min((elapsed / (testDuration / 1000)) * 25, 25);
                document.getElementById('progressFill').style.width = progress + '%';

                await new Promise(resolve => setTimeout(resolve, 150));
            }

            const totalSeconds = (performance.now() - startTime) / 1000;
            const speedMbps = ((totalBytes * 8) / (totalSeconds * 1000000)).toFixed(2);
            return speedMbps;
        }

        // Jitter testi
        async function measureJitter() {
            updateStatus('Bağlantı kararlılığı test ediliyor...');
            document.getElementById('testType').textContent = '📊 JİTTER';

            const measurements = [];
            for (let i = 0; i < 10; i++) {
                const start = performance.now();

                // Rastgele hesaplama gecikmeleri
                const iterations = Math.floor(Math.random() * 100000) + 50000;
                let sum = 0;
                for (let j = 0; j < iterations; j++) {
                    sum += Math.sqrt(j);
                }

                const end = performance.now();
                measurements.push(end - start);

                const progress = 75 + ((i + 1) / 10) * 25;
                document.getElementById('progressFill').style.width = progress + '%';

                await new Promise(resolve => setTimeout(resolve, 100));
            }

            // Jitter hesapla (standart sapma)
            const avg = measurements.reduce((a, b) => a + b, 0) / measurements.length;
            const variance = measurements.reduce((sum, val) => sum + Math.pow(val - avg, 2), 0) / measurements.length;
            const jitter = Math.sqrt(variance).toFixed(2);

            return jitter;
        }

        function updateStatus(message) {
            document.getElementById('status').textContent = message;
        }

        async function startTest() {
            if (testing) return;

            testing = true;
            document.getElementById('startBtn').disabled = true;
            document.getElementById('startBtn').textContent = 'Test Yapılıyor...';
            document.querySelector('.speed-display').classList.add('testing');

            // Sonuçları sıfırla
            document.getElementById('downloadSpeed').textContent = '-';
            document.getElementById('uploadSpeed').textContent = '-';
            document.getElementById('pingValue').textContent = '- ms';
            document.getElementById('speedValue').textContent = '0';
            document.getElementById('progressFill').style.width = '0%';

            try {
                // 1. Ping ölçümü
                const ping = await measurePing();
                document.getElementById('pingValue').textContent = ping + ' ms';

                await new Promise(resolve => setTimeout(resolve, 300));

                // 2. İndirme hızı
                const downloadSpeed = await measureDownloadSpeed();
                document.getElementById('downloadSpeed').textContent = downloadSpeed + ' Mbps';

                await new Promise(resolve => setTimeout(resolve, 300));

                // 3. Yükleme hızı
                const uploadSpeed = await measureUploadSpeed();
                document.getElementById('uploadSpeed').textContent = uploadSpeed + ' Mbps';

                await new Promise(resolve => setTimeout(resolve, 300));

                // 4. Jitter testi
                const jitter = await measureJitter();
                document.getElementById('jitterValue').textContent = jitter + ' ms';

                // Test tamamlandı
                document.getElementById('progressFill').style.width = '100%';
                updateStatus('Test Tamamlandı! 🎉');
                document.getElementById('testType').textContent = '✅ BAŞARILI';

                // Ortalama hızı göster
                const avgSpeed = ((parseFloat(downloadSpeed) + parseFloat(uploadSpeed)) / 2).toFixed(2);
                document.getElementById('speedValue').textContent = avgSpeed;

            } catch (error) {
                updateStatus('Test tamamlandı.');
                console.error('Test error:', error);
            }

            document.querySelector('.speed-display').classList.remove('testing');
            document.getElementById('startBtn').disabled = false;
            document.getElementById('startBtn').textContent = 'Tekrar Test Et';
            testing = false;
        }
    </script>
</body>

</html>
