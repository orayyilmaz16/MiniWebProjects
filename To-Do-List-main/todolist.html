<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced To-Do</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
    --bg:#020617;
    --card:#0f172a;
    --accent:#38bdf8;
    --success:#4ade80;
    --danger:#f87171;
    --text:#e5e7eb;
    --muted:#94a3b8;
}

body{
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:linear-gradient(135deg,#020617,#020617);
    color:var(--text);
    min-height:100vh;
    padding:1.5rem;
    display:flex;
    justify-content:center;
}

.app{
    width:100%;
    max-width:900px;
    background:var(--card);
    border-radius:28px;
    padding:2rem;
    box-shadow:0 30px 80px rgba(0,0,0,.6);
    animation:fade .8s ease;
}

/* HEADER */
.header{
    display:flex;
    flex-wrap:wrap;
    justify-content:space-between;
    gap:1rem;
    margin-bottom:2rem;
}

.header h1{
    font-size:1.8rem;
    position:relative;
}

.header h1::after{
    content:"";
    position:absolute;
    left:0;
    bottom:-6px;
    width:50px;
    height:3px;
    background:var(--accent);
    transition:.4s;
}

.header h1:hover::after{width:120px}

.time-box{
    text-align:right;
    font-size:.9rem;
}

.time-box span{
    display:block;
    color:var(--muted);
}

/* INPUT */
.input-group{
    display:flex;
    gap:.75rem;
    margin-bottom:2rem;
}

.input-group input{
    flex:1;
    padding:.8rem 1rem;
    border-radius:14px;
    border:none;
    outline:none;
    background:#020617;
    color:var(--text);
}

.input-group button{
    padding:.8rem 1.4rem;
    border-radius:14px;
    border:none;
    background:var(--accent);
    font-weight:600;
    cursor:pointer;
    transition:.25s;
}

.input-group button:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(56,189,248,.4);
}

/* SECTIONS */
.sections{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:1.5rem;
}

.section{
    background:#020617;
    border-radius:20px;
    padding:1.2rem;
}

.section h2{
    font-size:1.1rem;
    margin-bottom:1rem;
}

ul{
    list-style:none;
    display:flex;
    flex-direction:column;
    gap:.6rem;
}

li{
    background:var(--card);
    border-radius:14px;
    padding:.75rem 1rem;
    display:flex;
    justify-content:space-between;
    align-items:center;
    animation:slide .35s ease forwards;
}

.meta{
    font-size:.75rem;
    color:var(--muted);
}

/* BUTTONS */
.actions button{
    background:none;
    border:none;
    cursor:pointer;
    font-size:.8rem;
    margin-left:.4rem;
}

.done-btn{color:var(--success)}
.delete-btn{color:var(--danger)}

.actions button::after{
    content:"";
    display:block;
    height:2px;
    width:0;
    background:currentColor;
    transition:.3s;
}

.actions button:hover::after{width:100%}

/* STOPWATCH */
.stopwatch{
    margin-top:2rem;
    padding:1.2rem;
    background:#020617;
    border-radius:20px;
    text-align:center;
}

.stopwatch h3{
    margin-bottom:.5rem;
}

.timer{
    font-size:1.8rem;
    margin-bottom:.8rem;
}

.stopwatch button{
    margin:.2rem;
    padding:.5rem 1rem;
    border-radius:10px;
    border:none;
    cursor:pointer;
    font-weight:600;
}

/* ANIMATIONS */
@keyframes slide{
    from{opacity:0;transform:translateY(10px)}
    to{opacity:1;transform:translateY(0)}
}
@keyframes fade{
    from{opacity:0;transform:scale(.96)}
    to{opacity:1;transform:scale(1)}
}

/* RESPONSIVE */
@media(max-width:700px){
    .sections{grid-template-columns:1fr}
}
</style>
</head>

<body>
<div class="app">

    <div class="header">
        <h1>To-Do Manager</h1>
        <div class="time-box">
            <strong id="clock"></strong>
            <span>Yerel Saat</span>
        </div>
    </div>

    <div class="input-group">
        <input id="todoInput" placeholder="Yeni görev...">
        <button id="addBtn">Ekle</button>
    </div>

    <div class="sections">
        <div class="section">
            <h2>Yapılacaklar</h2>
            <ul id="activeList"></ul>
        </div>

        <div class="section">
            <h2>Yapılanlar</h2>
            <ul id="doneList"></ul>
        </div>
    </div>

    <div class="stopwatch">
        <h3>Kronometre</h3>
        <div class="timer" id="timer">00:00:00</div>
        <button onclick="startTimer()">Start</button>
        <button onclick="stopTimer()">Stop</button>
        <button onclick="resetTimer()">Reset</button>
    </div>

</div>

<script>
/* LOCAL CLOCK */
const clock=document.getElementById("clock");
setInterval(()=>{
    clock.textContent=new Intl.DateTimeFormat("tr-TR",
    {hour:"2-digit",minute:"2-digit",second:"2-digit"}).format(new Date());
},1000);

/* TODO */
const input=document.getElementById("todoInput");
const addBtn=document.getElementById("addBtn");
const activeList=document.getElementById("activeList");
const doneList=document.getElementById("doneList");

addBtn.onclick=addTodo;

function addTodo(){
    if(!input.value.trim())return;

    const created=new Date().toLocaleTimeString("tr-TR");
    const li=document.createElement("li");

    li.innerHTML=`
        <div>
            <strong>${input.value}</strong>
            <div class="meta">Oluşturuldu: ${created}</div>
        </div>
        <div class="actions">
            <button class="done-btn">✔</button>
            <button class="delete-btn">Sil</button>
        </div>
    `;

    activeList.appendChild(li);
    input.value="";

    li.querySelector(".done-btn").onclick=()=>{
        const finished=new Date().toLocaleTimeString("tr-TR");
        li.querySelector(".meta").textContent=`Bitti: ${finished}`;
        doneList.appendChild(li);
        li.querySelector(".done-btn").remove();
    };

    li.querySelector(".delete-btn").onclick=()=>{
        li.style.opacity=0;
        setTimeout(()=>li.remove(),250);
    };
}

/* STOPWATCH */
let seconds=0,interval=null;

function updateTimer(){
    const h=String(Math.floor(seconds/3600)).padStart(2,"0");
    const m=String(Math.floor(seconds%3600/60)).padStart(2,"0");
    const s=String(seconds%60).padStart(2,"0");
    document.getElementById("timer").textContent=`${h}:${m}:${s}`;
}

function startTimer(){
    if(interval)return;
    interval=setInterval(()=>{seconds++;updateTimer()},1000);
}

function stopTimer(){
    clearInterval(interval);
    interval=null;
}

function resetTimer(){
    stopTimer();
    seconds=0;
    updateTimer();
}
</script>
</body>
</html>
